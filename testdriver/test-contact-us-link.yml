steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
      - command: scroll-until-text
        text: Contact Us
        direction: down
        method: keyboard
  - prompt: Click the "Contact Us" link.
    commands:
      - command: hover-text
        text: Contact
        description: link in the footer
        action: click
  - prompt: Assert that the contact page loads successfully.
    commands:
      - command: assert
        expect: YOPmail - Contact is visible
  - prompt: >-
      Assert there are no errors displayed on the contact page.  # Use the
      content of the file from the environment
    commands:
      - command: assert
        expect: no error messages are visible
